<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TTB Label Verification</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <main class="page">
      <header class="topbar">
        <div>
          <p class="eyebrow">TTB Label Verification</p>
          <h1>Label Check</h1>
        </div>
        <div id="health-badge" class="health-badge pending" role="status" aria-live="polite">
          Checking backend
        </div>
      </header>

      <section id="message" class="message" hidden tabindex="-1" aria-live="polite"></section>

      <form id="verify-form" class="verify-form">
        <div id="label-cards" class="label-cards"></div>

        <div class="actions">
          <p id="form-status" class="form-status">Add the missing items to check this label.</p>
          <button id="add-label-button" type="button" class="secondary">Add Label</button>
          <button id="submit-button" type="submit" disabled>Check Label</button>
          <button id="reset-button" type="button" class="secondary">Check Another Label</button>
        </div>
      </form>

      <section id="progress-panel" class="progress-panel" hidden aria-live="polite">
        <p id="progress-text">Checking labels. This may take a few seconds.</p>
        <div class="progress-bar" aria-hidden="true"><span></span></div>
      </section>

      <section id="result-panel" class="result-panel" hidden aria-labelledby="result-title">
        <div class="result-summary">
          <div>
            <p class="eyebrow">Result</p>
            <h2 id="result-title">Verification</h2>
          </div>
          <div>
            <span id="verdict-badge" class="verdict-badge">Pending</span>
            <p id="latency" class="latency"></p>
          </div>
        </div>

        <div id="batch-summary" class="batch-summary" hidden></div>
        <div id="batch-results" class="batch-results"></div>

        <details id="single-extracted-details" class="extracted-details">
          <summary>Extracted label text</summary>
          <dl id="extracted-list"></dl>
        </details>
      </section>

      <template id="label-card-template">
        <article class="label-card">
          <div class="card-heading">
            <h2>Label</h2>
            <button type="button" class="remove-label secondary">Remove</button>
          </div>
          <div class="form-layout">
            <section class="form-section photo-section">
              <h3>Label photo</h3>
              <label class="file-picker">
                <span data-file-name>Choose label photo</span>
                <input data-field="image" type="file" accept="image/jpeg,image/png,image/webp" required>
              </label>
              <img class="image-preview" alt="">
            </section>

            <section class="form-section data-section">
              <h3>Application Data</h3>
              <div class="field-stack">
                <div class="field-row" data-field-row="brand_name">
                  <label>Brand name</label>
                  <input data-field="brand_name" autocomplete="organization" required>
                  <div class="inline-result pending" data-result-for="brand_name" aria-live="polite">
                    <span class="result-status">Not checked</span>
                    <span class="result-value">Found on label will appear here.</span>
                    <span class="result-message"></span>
                  </div>
                </div>

                <div class="field-row" data-field-row="product_class">
                  <label>Product type</label>
                  <input data-field="product_class" required>
                  <div class="inline-result pending" data-result-for="product_class" aria-live="polite">
                    <span class="result-status">Not checked</span>
                    <span class="result-value">Found on label will appear here.</span>
                    <span class="result-message"></span>
                  </div>
                </div>

                <div class="field-row" data-field-row="producer">
                  <label>Producer or company</label>
                  <input data-field="producer" required>
                  <div class="inline-result pending" data-result-for="producer" aria-live="polite">
                    <span class="result-status">Not checked</span>
                    <span class="result-value">Found on label will appear here.</span>
                    <span class="result-message"></span>
                  </div>
                </div>

                <div class="field-row" data-field-row="country_of_origin">
                  <label>Country</label>
                  <div class="stacked-control">
                    <select data-field="country_of_origin" required>
                      <option value="">Choose country</option>
                      <option>United States</option>
                      <option>Argentina</option>
                      <option>Australia</option>
                      <option>Austria</option>
                      <option>Canada</option>
                      <option>Chile</option>
                      <option>France</option>
                      <option>Germany</option>
                      <option>Italy</option>
                      <option>Japan</option>
                      <option>Mexico</option>
                      <option>New Zealand</option>
                      <option>Portugal</option>
                      <option>South Africa</option>
                      <option>Spain</option>
                      <option>United Kingdom</option>
                      <option value="__other__">Other</option>
                    </select>
                    <input class="other-input" type="text" autocomplete="country-name" placeholder="Enter country" hidden>
                  </div>
                  <div class="inline-result pending" data-result-for="country_of_origin" aria-live="polite">
                    <span class="result-status">Not checked</span>
                    <span class="result-value">Found on label will appear here.</span>
                    <span class="result-message"></span>
                  </div>
                </div>

                <div class="field-row" data-field-row="abv">
                  <label>Alcohol percentage</label>
                  <div class="suffix-control">
                    <input data-field="abv" type="number" min="0" max="100" step="0.5" required>
                    <span>%</span>
                  </div>
                  <div class="inline-result pending" data-result-for="abv" aria-live="polite">
                    <span class="result-status">Not checked</span>
                    <span class="result-value">Found on label will appear here.</span>
                    <span class="result-message"></span>
                  </div>
                </div>

                <div class="field-row" data-field-row="net_contents">
                  <label>Bottle size</label>
                  <select data-field="net_contents" required>
                    <option value="">Choose size</option>
                    <option>50 ml</option>
                    <option>100 ml</option>
                    <option>187.5 ml</option>
                    <option>200 ml</option>
                    <option>375 ml</option>
                    <option>500 ml</option>
                    <option>700 ml</option>
                    <option>750 ml</option>
                    <option>1 L</option>
                    <option>1.5 L</option>
                    <option>1.75 L</option>
                  </select>
                  <div class="inline-result pending" data-result-for="net_contents" aria-live="polite">
                    <span class="result-status">Not checked</span>
                    <span class="result-value">Found on label will appear here.</span>
                    <span class="result-message"></span>
                  </div>
                </div>

                <div class="field-row warning-row" data-field-row="government_warning">
                  <label>Government warning</label>
                  <textarea data-field="government_warning" rows="6" required></textarea>
                  <div class="inline-result pending" data-result-for="government_warning" aria-live="polite">
                    <span class="result-status">Not checked</span>
                    <span class="result-value">Found on label will appear here.</span>
                    <span class="result-message"></span>
                  </div>
                </div>
              </div>
            </section>
          </div>
        </article>
      </template>
    </main>

    <script src="/static/app.js?v=phase5-batch-20260621"></script>
  </body>
</html>
